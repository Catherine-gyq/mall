services:
  mysql:
    image: mysql:8.0
    container_name: mall-mysql
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mall
    ports:
      - "3306:3306"
    volumes:
      - mall-mysql-data:/var/lib/mysql
      - ./document/sql/mall.sql:/docker-entrypoint-initdb.d/01-mall.sql:ro

  redis:
    image: redis:7
    container_name: mall-redis
    command: redis-server --appendonly yes
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - mall-redis-data:/data

  rabbitmq:
    image: rabbitmq:3.9.11-management
    container_name: mall-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: mall
      RABBITMQ_DEFAULT_PASS: mall
      RABBITMQ_DEFAULT_VHOST: /mall
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - mall-rabbitmq-data:/var/lib/rabbitmq

  mongo:
    image: mongo:4
    container_name: mall-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mall-mongo-data:/data/db

  elasticsearch:
    image: elasticsearch:7.17.3
    container_name: mall-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - mall-es-data:/usr/share/elasticsearch/data

  minio:
    image: minio/minio
    container_name: mall-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mall-minio-data:/data

  minio-init:
    image: minio/mc
    container_name: mall-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 1; done;
      mc mb -p local/mall || true;
      exit 0;
      "

  mall-admin:
    build:
      context: .
      dockerfile: docker/mall-admin/Dockerfile
    image: mall/mall-admin:local
    container_name: mall-admin
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - minio
      - minio-init
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - ./logs/mall-admin:/var/logs

  mall-search:
    build:
      context: .
      dockerfile: docker/mall-search/Dockerfile
    image: mall/mall-search:local
    container_name: mall-search
    restart: unless-stopped
    depends_on:
      - mysql
      - elasticsearch
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
    ports:
      - "8081:8081"
    volumes:
      - ./logs/mall-search:/var/logs

  mall-portal:
    build:
      context: .
      dockerfile: docker/mall-portal/Dockerfile
    image: mall/mall-portal:local
    container_name: mall-portal
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - mongo
      - rabbitmq
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
    ports:
      - "8085:8085"
    volumes:
      - ./logs/mall-portal:/var/logs

volumes:
  mall-mysql-data:
  mall-redis-data:
  mall-rabbitmq-data:
  mall-mongo-data:
  mall-es-data:
  mall-minio-data:
